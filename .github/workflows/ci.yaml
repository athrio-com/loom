name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20
      - run: bun install --frozen-lockfile
      - run: bun test
      - name: The committed source matches the corpus
        run: |
          bun run --filter @athrio/loom build
          bun packages/loom/dist/main.js tangle corpus
          git diff --exit-code
