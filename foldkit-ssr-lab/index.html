<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Foldkit SSR — Todos</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1014;
        --panel: #15171d;
        --line: #ffffff14;
        --fg: #e6e6ea;
        --muted: #7a7e8c;
        --mint: #8fe0b6;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: start center;
        background: var(--bg);
        color: var(--fg);
        font: 15px/1.5 ui-sans-serif, system-ui, sans-serif;
      }
      .todo {
        width: min(560px, 92vw);
        margin-top: 12vh;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
      }
      .head { padding: 20px 22px 12px; }
      .head h1 { margin: 0 0 12px; font-size: 22px; font-weight: 600; }
      .compose { display: flex; gap: 8px; }
      .new {
        flex: 1;
        padding: 9px 12px;
        background: #0f1014;
        border: 1px solid var(--line);
        border-radius: 9px;
        color: var(--fg);
        font: inherit;
      }
      .new:focus { outline: none; border-color: var(--mint); }
      .add, .clear, .filter {
        padding: 9px 14px;
        background: transparent;
        border: 1px solid var(--line);
        border-radius: 9px;
        color: var(--fg);
        font: inherit;
        cursor: pointer;
      }
      .add { border-color: var(--mint); color: var(--mint); }
      .list { list-style: none; margin: 0; padding: 6px 0; }
      .item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 22px;
        border-top: 1px solid var(--line);
      }
      .item .text { flex: 1; }
      .item.done .text { color: var(--muted); text-decoration: line-through; }
      .remove {
        background: none;
        border: none;
        color: var(--muted);
        font-size: 18px;
        cursor: pointer;
      }
      .foot {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 22px;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 13px;
      }
      .count { margin-right: auto; }
      .filters { display: flex; gap: 6px; }
      .filter { padding: 5px 10px; }
      .filter.on { border-color: var(--mint); color: var(--mint); }
    </style>
    <script type="module" src="/src/app/client.ts"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
