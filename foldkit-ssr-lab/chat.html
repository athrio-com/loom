<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Foldkit SSR — Chat</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1014;
        --panel: #15171d;
        --line: #ffffff14;
        --fg: #e6e6ea;
        --muted: #7a7e8c;
        --mint: #8fe0b6;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--fg);
        font: 15px/1.5 ui-sans-serif, system-ui, sans-serif;
      }
      .chat { display: grid; grid-template-columns: 210px 1fr; height: 100vh; }
      .channels {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 16px 12px;
        background: var(--panel);
        border-right: 1px solid var(--line);
      }
      .tab {
        text-align: left;
        padding: 8px 12px;
        background: transparent;
        border: 1px solid transparent;
        border-radius: 8px;
        color: var(--muted);
        font: inherit;
        cursor: pointer;
      }
      .tab:hover { color: var(--fg); }
      .tab.on { color: var(--mint); border-color: var(--line); background: #0f1014; }
      .main { display: flex; flex-direction: column; min-width: 0; }
      .room { flex: 1; overflow-y: auto; padding: 20px 24px; }
      .feed {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .bubble { max-width: 70%; padding: 9px 13px; border-radius: 12px; }
      .bubble.them { align-self: flex-start; background: var(--panel); border: 1px solid var(--line); }
      .bubble.me { align-self: flex-end; background: var(--mint); color: #0f1014; }
      .feed.skeleton .ghost {
        width: 42%;
        height: 36px;
        background: var(--panel);
        border: 1px solid var(--line);
        animation: pulse 1.2s ease-in-out infinite;
      }
      .feed.skeleton .ghost:nth-child(even) { align-self: flex-end; width: 58%; }
      @keyframes pulse { 0%, 100% { opacity: 0.45; } 50% { opacity: 0.9; } }
      .composer {
        display: flex;
        gap: 8px;
        padding: 14px 24px;
        border-top: 1px solid var(--line);
        background: var(--panel);
      }
      .draft {
        flex: 1;
        padding: 9px 12px;
        background: #0f1014;
        border: 1px solid var(--line);
        border-radius: 9px;
        color: var(--fg);
        font: inherit;
      }
      .draft:focus { outline: none; border-color: var(--mint); }
      .send {
        padding: 9px 16px;
        background: transparent;
        border: 1px solid var(--mint);
        border-radius: 9px;
        color: var(--mint);
        font: inherit;
        cursor: pointer;
      }
    </style>
    <script type="module" src="/src/chat/client.ts"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
